<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To Do List</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

input{
    width:70%;
    padding:8px;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#eee;
    padding:10px;
    margin-top:5px;
    display:flex;
    justify-content:space-between;
}

.delete{
    color:red;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>To Do List</h1>

<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>

<script>

function addTask(){

let input=document.getElementById("taskInput");

let task=input.value;

if(task===""){
alert("Enter a task");
return;
}

let li=document.createElement("li");

li.textContent=task;

let del=document.createElement("span");

del.textContent="Delete";

del.className="delete";

del.onclick=function(){
li.remove();
}

li.appendChild(del);

document.getElementById("taskList").appendChild(li);

input.value="";

}

</script>

</body>
</html>
